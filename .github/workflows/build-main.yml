name: Build and Publish (Snapshot)

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
  - cron: "0 0 * * *"

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  build:
    needs:
      - checks
    strategy:
      matrix:
        java-version:
          - 11
          - 17
          - 21
        etcd:
          - quay.io/coreos/etcd:v3.5.29
          - quay.io/coreos/etcd:v3.6.11
    uses: ./.github/workflows/build.yml
    with:
      javaVersion: "${{ matrix.java-version }}"
      etcdImage: "${{ matrix.etcd }}"

  publish:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: 'Checkout'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: 'Set Up Java'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 11
          distribution: 'temurin'
          cache: 'gradle'
      - name: 'Collect Info'
        run: |
          ./gradlew currentVersion
      - name: 'Publish Snapshot'
        if: github.event_name != 'schedule'
        env:
          ORG_GRADLE_PROJECT_nexusUsername: ${{ secrets.SONATYPE_USR }}
          ORG_GRADLE_PROJECT_nexusPassword: ${{ secrets.SONATYPE_PWD }}
        run: |
          ./gradlew publishSnapshot -Prelease.forceSnapshot
